name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Static analysis ──────────────────────────────────────────────────
      - name: Lint with ruff
        run: |
          pip install ruff --quiet
          ruff check app/ --output-format=github

      # ── Config smoke test (ensures Settings can load without real secrets) ─
      - name: Verify config loads in development mode
        env:
          ENVIRONMENT: development
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-real
        run: |
          python -c "
          from app.core.config import settings
          assert settings.ENVIRONMENT == 'development', 'Expected development env'
          print('Config OK — ENVIRONMENT:', settings.ENVIRONMENT)
          print('CORS origins:', settings.CORS_ORIGINS)
          "

      # ── Placeholder for pytest ───────────────────────────────────────────
