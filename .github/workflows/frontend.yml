name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  lint-and-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint

      # ── Type check ────────────────────────────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── Production build ──────────────────────────────────────────────────
      - name: Build
        env:
          VITE_API_URL: https://seven-day-interview.onrender.com/api/v1
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
