# render.yaml — Render Infrastructure Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# This file defines the backend web service.
# Environment variables marked `generateValue: true` are auto-generated by Render.
# All others must be set manually in the Render dashboard.

services:
  - type: web
    name: 7-day-interview
    runtime: python
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash prestart.sh && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free           # change to starter/standard for production SLAs
    autoDeploy: true

    healthCheckPath: /health

    envVars:
      # ── Core ─────────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production

      - key: LOG_LEVEL
        value: INFO

      # ── Auth / JWT ────────────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true    # Render generates a secure random value on first deploy

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      # ── Database (Supabase PostgreSQL) ────────────────────────────────────
      - key: DATABASE_URL
        sync: false            # Set manually in Render dashboard

      # ── Redis (Upstash) ───────────────────────────────────────────────────
      - key: REDIS_URL
        sync: false            # Set manually: rediss://default:<pass>@enabling-panther-131374.upstash.io:6379

      - key: UPSTASH_REDIS_REST_URL
        value: https://enabling-panther-131374.upstash.io

      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false            # Set manually in Render dashboard

      # ── Google / Gemini AI ────────────────────────────────────────────────
      - key: GOOGLE_API_KEY
        sync: false            # Set manually in Render dashboard

      # ── Supabase ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: https://nnxyvwodgxbuiuutapsx.supabase.co

      - key: SUPABASE_ANON_KEY
        sync: false            # Set manually: Supabase anon key (optional)

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false            # Set manually: Supabase service role key

      - key: SUPABASE_STORAGE_BUCKET
        value: resumes

      - key: SUPABASE_STORAGE_BUCKET_PUBLIC
        value: "false"

      # ── CORS / Frontend ───────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false            # Set manually: https://<your-project>.vercel.app

      # ── ATS ───────────────────────────────────────────────────────────────
      - key: ATS_SCORE_THRESHOLD
        value: "65"

      # ── Observability (optional) ──────────────────────────────────────────
      - key: SENTRY_DSN
        value: ""
